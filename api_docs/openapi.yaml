      summary: Issue construction permit
      description: Generates Construction Permit PDF with QR code and officer signature, stores in vault, emails applicant, transitions to PERMIT_ISSUED.
      operationId: issuePermit
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
