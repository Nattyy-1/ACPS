openapi: "3.0.3"
info:
  title: Automated Construction Permit System (ACPS) API
  description: |
    Backend API for the Ethiopian Automated Construction Permit System.
    Covers end-to-end permit lifecycle: application → neighbor consent → payment →
    technical review → senior approval → permit issuance → construction →
    inspection → completion certificate.

    Base URL: `/api/v1/`
    Authentication: JWT Bearer tokens via `Authorization: Bearer <token>` header.
    Obtained from `POST /api/v1/auth/login/`.
  version: "1.0.0"
  contact:
    name: ACPS Development Team

servers:
  - url: /api/v1
    description: API v1 base path

tags:
  - name: Authentication
    description: Registration, login, token refresh, password reset
  - name: Users
    description: Profile management and admin user administration
  - name: Applications
    description: Permit application CRUD, document upload, submission
  - name: Neighbors
    description: Neighbor consent management
  - name: Payments
    description: Invoice, payment demonstration, receipts
  - name: Reviews
    description: Technical review workflow, comments, decisions
  - name: Approvals
    description: Senior officer approvals, consent/permit/certificate issuance
  - name: Permits
    description: Public permit verification and detail
  - name: Inspections
    description: Construction commencement, inspection scheduling, digital site inspection
  - name: Notifications
    description: User notification list and read status
  - name: Administration
    description: Admin dashboard stats, config, audit log, reports, signatures

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─────────────────────────────────────────────────
    #  ACCOUNTS / AUTH SCHEMAS
    # ─────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [full_name, phone, email, password]
      properties:
        full_name:
          type: string
          example: "Abebe Kebede"
        phone:
          type: string
          example: "+251911111111"
        email:
          type: string
          format: email
          example: "abebe@example.com"
        password:
          type: string
          minLength: 8
          example: "securePass123"

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: "Account created"
        user_id:
          type: string
          format: uuid
          example: "a1b2c3d4-..."

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        access:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        refresh:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        role:
          type: string
          enum: [APPLICANT, REVIEW_OFFICER, INSPECTOR, SENIOR_OFFICER, ADMIN]
        user_id:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string

    RefreshResponse:
      type: object
      properties:
        access:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
          example: "Password reset link sent to your email"

    ResetPasswordRequest:
      type: object
      required: [uid, token, new_password]
      properties:
        uid:
          type: string
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    ResetPasswordResponse:
      type: object
      properties:
        message:
          type: string
          example: "Password has been reset successfully"

    # ─────────────────────────────────────────────────
    #  USER SCHEMAS
    # ─────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [APPLICANT, REVIEW_OFFICER, INSPECTOR, SENIOR_OFFICER, ADMIN]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        subcity_id:
          type: string
        land_certificate_number:
          type: string
        tin:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        subcity_id:
          type: string
        land_certificate_number:
          type: string
        tin:
          type: string

    VaultDocumentUploadResponse:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED]
        validation_result:
          type: string
          example: "valid"

    VaultDocument:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
        file_name:
          type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED]
        rejection_reason:
          type: string
        version_number:
          type: integer
        uploaded_at:
          type: string
          format: date-time

    VaultDocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/VaultDocument"

    AdminUserCreateRequest:
      type: object
      required: [full_name, email, phone, role]
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
          enum: [REVIEW_OFFICER, INSPECTOR, SENIOR_OFFICER, ADMIN]
        subcity_id:
          type: string

    AdminUserCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
        role:
          type: string
        subcity_id:
          type: string
        password:
          type: string
          description: Auto-generated temporary password

    AdminUserDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
        role:
          type: string
        status:
          type: string
        subcity_id:
          type: string
        land_certificate_number:
          type: string
        tin:
          type: string
        is_active:
          type: boolean
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time

    DeactivateResponse:
      type: object
      properties:
        message:
          type: string
        user_id:
          type: string
          format: uuid

    # ─────────────────────────────────────────────────
    #  APPLICATION SCHEMAS
    # ─────────────────────────────────────────────────
    ApplicationCreateRequest:
      type: object
      required:
        - intended_use
        - height_m
        - floors_above
        - floors_below
        - floor_area_sqm
        - plot_address
        - plot_gps_lat
        - plot_gps_lng
        - subcity_id
        - woreda
        - architect_name
        - architect_license
        - project_value_etb
      properties:
        intended_use:
          type: string
          example: "Residential"
        height_m:
          type: number
          format: float
          example: 12.5
        floors_above:
          type: integer
          example: 3
        floors_below:
          type: integer
          example: 1
        floor_area_sqm:
          type: number
          format: float
          example: 250.0
        plot_address:
          type: string
          example: "123 Main St"
        plot_gps_lat:
          type: number
          format: float
          example: 9.03
        plot_gps_lng:
          type: number
          format: float
          example: 38.74
        subcity_id:
          type: string
          example: "SC-01"
        woreda:
          type: string
          example: "Woreda 1"
        architect_name:
          type: string
          example: "Arch A"
        architect_license:
          type: string
          example: "AL-001"
        contractor_name:
          type: string
          example: "Contractor C"
        contractor_license:
          type: string
          example: "CL-001"
        project_value_etb:
          type: number
          format: float
          example: 1500000

    ApplicationCreateResponse:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
          example: "ACPS-2026-000001"
        status:
          type: string
          example: "DRAFT"
        building_category:
          type: string
          enum: [A, B, C]
        calculated_fee:
          type: number
          format: float
          nullable: true

    ApplicationListResponseItem:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        status:
          type: string
        building_category:
          type: string
        calculated_fee:
          type: number
          format: float
          nullable: true
        subcity_id:
          type: string
        created_at:
          type: string
          format: date-time
        applicant_name:
          type: string

    ApplicationUpdateRequest:
      type: object
      properties:
        intended_use:
          type: string
        height_m:
          type: number
          format: float
        floors_above:
          type: integer
        floors_below:
          type: integer
        floor_area_sqm:
          type: number
          format: float
        plot_address:
          type: string
        plot_gps_lat:
          type: number
          format: float
        plot_gps_lng:
          type: number
          format: float
        subcity_id:
          type: string
        woreda:
          type: string
        architect_name:
          type: string
        architect_license:
          type: string
        contractor_name:
          type: string
        contractor_license:
          type: string
        project_value_etb:
          type: number
          format: float

    ApplicationUpdateResponse:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        status:
          type: string
        building_category:
          type: string
        calculated_fee:
          type: number
          format: float
          nullable: true

    ApplicationDetailResponse:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        building_category:
          type: string
        status:
          type: string
        subcity_id:
          type: string
        woreda:
          type: string
        plot_address:
          type: string
        plot_gps_lat:
          type: number
          format: float
        plot_gps_lng:
          type: number
          format: float
        height_m:
          type: number
          format: float
        floors_above:
          type: integer
        floors_below:
          type: integer
        floor_area_sqm:
          type: number
          format: float
        intended_use:
          type: string
        architect_name:
          type: string
        architect_license:
          type: string
        contractor_name:
          type: string
        contractor_license:
          type: string
        project_value_etb:
          type: number
          format: float
        calculated_fee:
          type: number
          format: float
          nullable: true
        assigned_officer:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            full_name:
              type: string
        revision_cycle:
          type: integer
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentItem"
        neighbors:
          type: array
          items:
            $ref: "#/components/schemas/NeighborResponse"
        history:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DocumentItem:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
        file_name:
          type: string
        file_size_bytes:
          type: integer
        mime_type:
          type: string
        validation_status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED]
        rejection_reason:
          type: string
        version_number:
          type: integer
        is_current:
          type: boolean
        created_at:
          type: string
          format: date-time

    FeeBreakdownResponse:
      type: object
      properties:
        project_value_etb:
          type: number
          format: float
        calculation_method:
          type: string
          enum: [FORMULA, TIERED, FALLBACK]
        base_fee:
          type: number
          format: float
        fixed_fee:
          type: number
          format: float
        base_description:
          type: string
        fixed_description:
          type: string
        total:
          type: number
          format: float

    SubmitResponse:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        status:
          type: string
          example: "PAYMENT_PENDING"
        invoice_id:
          type: string
        amount_etb:
          type: number
          format: float

    SubmitErrorMissingDocs:
      type: object
      properties:
        detail:
          type: string
          example: "Completeness check failed."
        missing_documents:
          type: array
          items:
            type: object
            properties:
              document_type:
                type: string
              label:
                type: string
              reason:
                type: string

    TimelineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        previous_status:
          type: string
        new_status:
          type: string
        note:
          type: string
        actor_name:
          type: string
        created_at:
          type: string
          format: date-time

    RequiredDocumentItem:
      type: object
      properties:
        document_type:
          type: string
        label:
          type: string
        uploaded:
          type: boolean
        accepted:
          type: boolean
        status:
          type: string
          nullable: true

    ApplicationDocumentUploadResponse:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
        file_name:
          type: string
        file_size_bytes:
          type: integer
        mime_type:
          type: string
        version_number:
          type: integer
        status:
          type: string

    # ─────────────────────────────────────────────────
    #  NEIGHBOR SCHEMAS
    # ─────────────────────────────────────────────────
    NeighborCreateRequest:
      type: object
      required: [neighbor_name, neighbor_phone, consent_file]
      properties:
        neighbor_name:
          type: string
        neighbor_phone:
          type: string
        consent_file:
          type: string
          format: binary
          description: Scanned consent form (PDF/JPEG/PNG, max 10MB)

    NeighborCreateResponse:
      type: object
      properties:
        neighbor_id:
          type: string
          format: uuid
        neighbor_name:
          type: string
        neighbor_phone:
          type: string
        consent_file:
          type: string
        status:
          type: string
          example: "UPLOADED"
        created_at:
          type: string
          format: date-time

    NeighborResponse:
      type: object
      properties:
        neighbor_id:
          type: string
          format: uuid
        neighbor_name:
          type: string
        neighbor_phone:
          type: string
        consent_file:
          type: string
        status:
          type: string
          enum: [UPLOADED, VERIFIED]
        created_at:
          type: string
          format: date-time

    # ─────────────────────────────────────────────────
    #  PAYMENT SCHEMAS
    # ─────────────────────────────────────────────────
    InvoiceDetailResponse:
      type: object
      properties:
        invoice_id:
          type: string
        amount_etb:
          type: number
          format: float
        status:
          type: string
          enum: [PENDING, AWAITING_MANUAL_CONFIRMATION, CONFIRMED, EXPIRED, ARCHIVED]
        payment_method:
          type: string
          nullable: true
        available_methods:
          type: array
          items:
            type: string
            enum: [TELEBIRR, CBEBIRR, BANK_TRANSFER]
        application_arn:
          type: string
        application_id:
          type: string
          format: uuid
        fee_breakdown:
          $ref: "#/components/schemas/FeeBreakdownResponse"
        created_at:
          type: string
          format: date-time

    InvoicePayRequest:
      type: object
      required: [payment_method]
      properties:
        payment_method:
          type: string
          enum: [TELEBIRR, CBEBIRR, BANK_TRANSFER]

    InvoicePayResponseDigital:
      type: object
      properties:
        status:
          type: string
          example: "CONFIRMED"
        transaction_reference:
          type: string
        receipt_url:
          type: string
          nullable: true
        application_status:
          type: string

    InvoicePayResponseBankTransfer:
      type: object
      properties:
        status:
          type: string
          example: "AWAITING_MANUAL_CONFIRMATION"
        bank_details:
          type: object
          properties:
            bank_name:
              type: string
            account_name:
              type: string
            account_number:
              type: string
            branch:
              type: string
            reference_note:
              type: string
        message:
          type: string

    BankReceiptUploadResponse:
      type: object
      properties:
        detail:
          type: string
        receipt_url:
          type: string

    InvoiceConfirmResponse:
      type: object
      properties:
        status:
          type: string
        transaction_reference:
          type: string
        application_status:
          type: string

    PaymentListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              payment_id:
                type: string
                format: uuid
              invoice_id:
                type: string
              arn:
                type: string
              applicant:
                type: string
              amount_etb:
                type: number
                format: float
              method:
                type: string
              status:
                type: string
              transaction_reference:
                type: string
              paid_at:
                type: string
                format: date-time
                nullable: true
              created_at:
                type: string
                format: date-time

    PaymentExpiryResponse:
      type: object
      properties:
        expired_count:
          type: integer

    # ─────────────────────────────────────────────────
    #  REVIEW SCHEMAS
    # ─────────────────────────────────────────────────
    AssignReviewerRequest:
      type: object
      properties:
        officer_id:
          type: string
          format: uuid
          description: Optional explicit reviewer ID. If omitted, round-robin auto-assign.

    AssignReviewerResponse:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        assigned_officer:
          type: object
          properties:
            id:
              type: string
              format: uuid
            full_name:
              type: string

    ReviewQueueItem:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        status:
          type: string
        building_category:
          type: string
        subcity_id:
          type: string
        created_at:
          type: string
          format: date-time
        days_open:
          type: integer
        urgency:
          type: string
          enum: [normal, warning, critical]
        revision_cycle:
          type: integer

    CommentCreateRequest:
      type: object
      required: [category, content]
      properties:
        document:
          type: string
          format: uuid
          description: Optional - ID of the document being commented on
        category:
          type: string
          enum: [MISSING_INFO, DRAWING_ERROR, CODE_NON_COMPLIANCE, CLARIFICATION, OTHER]
        content:
          type: string

    CommentResponse:
      type: object
      properties:
        comment_id:
          type: string
          format: uuid
        application:
          type: string
          format: uuid
        document:
          type: string
          format: uuid
          nullable: true
        author:
          type: string
          format: uuid
        author_name:
          type: string
        document_name:
          type: string
          nullable: true
        category:
          type: string
        content:
          type: string
        resolution_status:
          type: string
          enum: [OPEN, RESOLVED, ESCALATED]
        resolved_by:
          type: string
          format: uuid
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CommentResolveRequest:
      type: object
      required: [resolution_status]
      properties:
        resolution_status:
          type: string
          enum: [RESOLVED, ESCALATED]

    ReviewDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [APPROVED, REJECTED]
        notes:
          type: string
          description: Required if REJECTED (min 100 chars)
        regulation_citation:
          type: string
          description: Required if REJECTED

    ReviewDecisionResponse:
      type: object
      properties:
        decision:
          type: string
        status:
          type: string
        message:
          type: string

    SLAStatusResponse:
      type: object
      properties:
        sla_configs:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              stage:
                type: string
              target_days:
                type: integer
              reminder_days:
                type: integer
              escalation_days:
                type: integer
        breaches:
          type: array
          items:
            type: object
            properties:
              application_id:
                type: string
                format: uuid
              arn:
                type: string
              status:
                type: string
              assigned_officer:
                type: string
              days_open:
                type: integer
              target_days:
                type: integer
              breached:
                type: boolean
        breach_count:
          type: integer

    # ─────────────────────────────────────────────────
    #  APPROVAL / PERMIT SCHEMAS
    # ─────────────────────────────────────────────────
    ApprovalsQueueItem:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        applicant_name:
          type: string
        building_category:
          type: string
        subcity_id:
          type: string
        status:
          type: string
        revision_cycle:
          type: integer
        comments_count:
          type: integer
        unresolved_comments:
          type: integer
        assigned_reviewer:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApprovalDetailResponse:
      type: object
      properties:
        application_id:
          type: string
          format: uuid
        arn:
          type: string
        applicant:
          type: object
          properties:
            id:
              type: string
              format: uuid
            full_name:
              type: string
            email:
              type: string
            phone:
              type: string
        building_category:
          type: string
        status:
          type: string
        subcity_id:
          type: string
        woreda:
          type: string
        plot_address:
          type: string
        plot_gps_lat:
          type: number
          format: float
        plot_gps_lng:
          type: number
          format: float
        height_m:
          type: number
          format: float
        floors_above:
          type: integer
        floors_below:
          type: integer
        floor_area_sqm:
          type: number
          format: float
        intended_use:
          type: string
        architect_name:
          type: string
        architect_license:
          type: string
        project_value_etb:
          type: number
          format: float
        calculated_fee:
          type: number
          format: float
          nullable: true
        revision_cycle:
          type: integer
        assigned_reviewer:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            full_name:
