  /applications/{application_id}/issue-completion-certificate/:
    post:
      tags: [Approvals]
      summary: Issue completion certificate
      description: Generates Completion Certificate PDF with QR code and signature, transitions to COMPLETED, archives permit.
      operationId: issueCompletionCertificate
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Completion certificate issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueCompletionCertificateResponse"
        "400":
          description: Cannot issue certificate or final inspection not passed
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not SENIOR_OFFICER)
        "404":
