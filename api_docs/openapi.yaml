        "200":
          description: Application rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeniorRejectResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not SENIOR_OFFICER)
        "404":
          description: Application not found

  /approvals/completion-review/{application_id}/:
    get:
