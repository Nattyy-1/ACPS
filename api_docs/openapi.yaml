  # ============================================================
  #  INSPECTIONS
  # ============================================================
  /applications/{application_id}/commence/:
    post:
      tags: [Inspections]
      summary: Commence construction
      description: Submits commencement notification. Transitions to UNDER_CONSTRUCTION and auto-schedules inspection milestones per building category.
      operationId: commenceConstruction
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommenceRequest"
      responses:
        "200":
          description: Construction commenced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommenceResponse"
        "400":
          description: Validation error or wrong status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/declare-completion/:
    post:
      tags: [Inspections]
      summary: Declare construction completion
      description: Submits completion declaration with ≥5 photos. Schedules Final Completion Inspection within 7 working days. Transitions to COMPLETION_DECLARED.
      operationId: declareCompletion
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [completion_date, photos]
              properties:
                completion_date:
                  type: string
                  format: date
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Minimum 5 photos of completed structure from at least 4 angles
      responses:
        "200":
          description: Completion declared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeclareCompletionResponse"
        "400":
          description: Validation error or wrong status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/inspections/:
    get:
      tags: [Inspections]
      summary: List application inspections
      description: Returns all inspection records for the application with type, scheduled date, assigned inspector, and outcome.
      operationId: listApplicationInspections
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Inspection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionResponse"
        "401":
          description: Unauthenticated
        "404":
          description: Application not found

  /applications/{application_id}/inspections/{inspection_id}/request-reinspection/:
    post:
      tags: [Inspections]
      summary: Request re-inspection
      description: Applicant requests a re-inspection after a failed inspection by describing corrections made. Schedules new re-inspection.
      operationId: requestReinspection
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: inspection_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReinspectionRequest"
      responses:
        "201":
          description: Re-inspection scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReinspectionResponse"
        "400":
          description: Validation error or inspection not failed
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application or inspection not found

  /inspections/my-schedule/:
    get:
      tags: [Inspections]
      summary: Get inspector schedule
      description: Returns upcoming assigned inspections sorted by date with site details and GPS coordinates.
      operationId: getInspectorSchedule
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Inspector schedule
