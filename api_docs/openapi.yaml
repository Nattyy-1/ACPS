        "400":
          description: Cannot issue consent in current status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not SENIOR_OFFICER)
        "404":
          description: Application not found

  /applications/{application_id}/issue-permit/:
    post:
