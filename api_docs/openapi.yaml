        "201":
          description: Construction permit issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuePermitResponse"
        "400":
          description: Cannot issue permit in current status or contractor not set
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not SENIOR_OFFICER)
        "404":
