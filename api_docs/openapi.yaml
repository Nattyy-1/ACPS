                  $ref: "#/components/schemas/InspectorScheduleItem"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not INSPECTOR)

  /inspections/{inspection_id}/:
    get:
      tags: [Inspections]
      summary: Get inspection detail
      description: Returns full inspection detail with checklist items and photos. Auto-populates checklist from templates if not yet created.
      operationId: getInspectionDetail
      security:
        - BearerAuth: []
      parameters:
        - name: inspection_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Inspection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not INSPECTOR)
        "404":
          description: Inspection not found

  /inspections/{inspection_id}/start/:
    post:
      tags: [Inspections]
      summary: Start inspection
      description: Records start timestamp and sets inspection status to IN_PROGRESS.
      operationId: startInspection
      security:
        - BearerAuth: []
      parameters:
        - name: inspection_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Inspection started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionStartResponse"
        "400":
          description: Cannot start inspection in current status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not INSPECTOR)
        "404":
          description: Inspection not found

  /inspections/{inspection_id}/checklist/:
    put:
      tags: [Inspections]
      summary: Update inspection checklist
      description: Updates checklist items (pass/fail/NA and notes). Can be called multiple times before submission.
      operationId: updateChecklist
      security:
        - BearerAuth: []
      parameters:
        - name: inspection_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistUpdateRequest"
      responses:
        "200":
          description: Checklist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistUpdateResponse"
        "400":
          description: Cannot update checklist or invalid data
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not INSPECTOR)
        "404":
          description: Inspection not found

  /inspections/{inspection_id}/photos/:
    post:
      tags: [Inspections]
      summary: Upload inspection photos
      description: Uploads inspection photos (JPEG/PNG, ≤10MB each). Minimum 3 photos required before submission. Each photo auto-timestamped.
      operationId: uploadInspectionPhotos
      security:
        - BearerAuth: []
      parameters:
        - name: inspection_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Photos uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  photos:
                    type: array
                    items:
                      $ref: "#/components/schemas/InspectionPhoto"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not INSPECTOR)
        "404":
          description: Inspection not found

  /inspections/{inspection_id}/submit/:
    post:
      tags: [Inspections]
      summary: Submit inspection results
      description: Submits inspection with overall result (PASSED/FAILED). Locks record from further edits. FAILED requires ≥50 char failure summary. On PASSED activates next milestone; on final completion PASSED notifies senior officer.
      operationId: submitInspection
      security:
        - BearerAuth: []
      parameters:
        - name: inspection_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InspectionSubmitRequest"
      responses:
        "200":
          description: Inspection submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionSubmitResponse"
        "400":
          description: Validation error or <3 photos
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not INSPECTOR)
        "404":
          description: Inspection not found

