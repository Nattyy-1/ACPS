      tags: [Administration]
      summary: Upload officer signature
      description: Uploads or updates an officer's signature PNG for PDF generation. Max 2MB, PNG only.
      operationId: uploadSignature
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [signature]
              properties:
                signature:
                  type: string
                  format: binary
                  description: PNG image, max 2MB
      responses:
        "200":
          description: Signature uploaded or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureUploadResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not ADMIN)
        "404":
          description: Officer not found
