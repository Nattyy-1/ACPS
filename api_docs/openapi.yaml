  # ============================================================
  #  APPLICATIONS
  # ============================================================
  /applications/:
    get:
      tags: [Applications]
      summary: List applications
      description: Returns applications filtered by role. APPLICANT sees own, REVIEW_OFFICER sees assigned, SENIOR_OFFICER and ADMIN see all.
      operationId: listApplications
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by application status (DRAFT, PAYMENT_PENDING, etc.)
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationListResponseItem"
        "401":
          description: Unauthenticated
    post:
      tags: [Applications]
      summary: Create new application
      description: Creates a DRAFT application with auto-generated ARN (ACPS-YYYY-XXXXXX) and auto-calculated fee.
      operationId: createApplication
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreateRequest"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationCreateResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)

  /applications/{application_id}/:
    get:
      tags: [Applications]
      summary: Get application detail
      description: Returns full nested application detail with documents, neighbors, history, and timeline.
      operationId: getApplicationDetail
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full application detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetailResponse"
        "401":
          description: Unauthenticated
        "404":
          description: Application not found
    put:
      tags: [Applications]
      summary: Update application (DRAFT or REVISION_REQUIRED only)
      description: Updates application building fields. Re-triggers category and fee calculation. Allowed only in DRAFT or REVISION_REQUIRED status.
      operationId: updateApplication
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdateRequest"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationUpdateResponse"
        "400":
          description: Cannot update in current status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/fee/:
    get:
      tags: [Applications]
      summary: Get fee breakdown
      description: Returns the calculated fee breakdown for the application (FORMULA, TIERED, or FALLBACK).
      operationId: getApplicationFee
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fee breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeBreakdownResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/documents/:
    post:
      tags: [Applications]
      summary: Upload application document
      description: Uploads a document for a DRAFT application. Validates PDF/DWG, <20MB, non-blank. Implements versioning.
      operationId: uploadApplicationDocument
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [document_type, file]
              properties:
                document_type:
                  type: string
                  enum: [ARCHITECTURAL, STRUCTURAL, SANITARY, ELECTRICAL, SOIL_TEST, PROFESSIONAL_LICENSE, FIRE_SAFETY]
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDocumentUploadResponse"
        "400":
          description: Validation error or not DRAFT
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/documents/{document_id}/:
    delete:
      tags: [Applications]
      summary: Delete application document
      description: Removes a document from a DRAFT application.
      operationId: deleteApplicationDocument
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Document deleted
        "400":
          description: Application not in DRAFT status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application or document not found

  /applications/{application_id}/required-documents/:
    get:
      tags: [Applications]
      summary: Get required documents checklist
      description: Returns the dynamic checklist of required document types for the application based on its building category.
      operationId: getRequiredDocuments
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Required documents checklist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequiredDocumentItem"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/submit/:
    post:
      tags: [Applications]
      summary: Submit application for payment
      description: Runs completeness check (all required docs present + accepted, ≥1 neighbor consent). On success transitions to PAYMENT_PENDING and generates invoice.
      operationId: submitApplication
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResponse"
        "400":
          description: Completeness check failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitErrorMissingDocs"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/neighbors/:
    get:
      tags: [Neighbors]
      summary: List neighbor consents
      description: Returns all neighbor records for the application.
      operationId: listNeighbors
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Neighbor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeighborResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found
    post:
      tags: [Neighbors]
      summary: Add neighbor consent
      description: Adds a neighbor consent record with uploaded consent file to a DRAFT application.
      operationId: addNeighbor
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NeighborCreateRequest"
      responses:
        "201":
          description: Neighbor consent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeighborCreateResponse"
        "400":
          description: Validation error or not DRAFT
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  /applications/{application_id}/neighbors/{neighbor_id}/:
    delete:
      tags: [Neighbors]
      summary: Delete neighbor consent
      description: Removes a neighbor record from a DRAFT application.
      operationId: deleteNeighbor
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: neighbor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Neighbor deleted
        "400":
          description: Application not in DRAFT status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application or neighbor not found

  /applications/{application_id}/timeline/:
    get:
      tags: [Applications]
      summary: Get application timeline
      description: Returns the full status change history of the application with timestamps and actor names.
      operationId: getApplicationTimeline
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Timeline history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineItem"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Application not found

  # ============================================================
  #  REVIEWS
  # ============================================================
  /applications/{application_id}/assign-reviewer/:
    post:
      tags: [Reviews]
      summary: Assign reviewer to application
      description: Assigns a review officer using round-robin (weighted by active review count) or explicit officer_id.
      operationId: assignReviewer
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignReviewerRequest"
      responses:
        "200":
          description: Reviewer assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignReviewerResponse"
        "400":
          description: Invalid status or no reviewer available
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not ADMIN)
        "404":
          description: Application not found

  /reviews/my-queue/:
    get:
      tags: [Reviews]
      summary: Get my review queue
      description: Returns applications assigned to the calling REVIEW_OFFICER sorted by SLA urgency.
      operationId: getMyReviewQueue
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Review queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewQueueItem"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not REVIEW_OFFICER)

  /reviews/workspace/{application_id}/:
    get:
      tags: [Reviews]
      summary: Get review workspace
      description: Returns full application detail with documents, form data, neighbors, and comment panel for the assigned reviewer.
      operationId: getReviewWorkspace
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Review workspace data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetailResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not REVIEW_OFFICER)
        "404":
          description: Application not found or not assigned to you

  /applications/{application_id}/comments/:
    get:
      tags: [Reviews]
      summary: List review comments
      description: Returns all comments for an application with author, category, timestamp, and resolution status.
      operationId: listComments
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Comment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentResponse"
        "401":
          description: Unauthenticated
        "404":
          description: Application not found
    post:
      tags: [Reviews]
      summary: Create review comment
      description: Adds a comment to an application. If not already REVISION_REQUIRED, transitions status and notifies applicant. Tracks revision cycles (>3 notifies senior).
      operationId: createComment
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not REVIEW_OFFICER)
        "404":
          description: Application not found or not assigned to you

  /applications/{application_id}/comments/{comment_id}/resolve/:
    put:
      tags: [Reviews]
      summary: Resolve or escalate a comment
      description: Marks a comment as RESOLVED or ESCALATED.
      operationId: resolveComment
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentResolveRequest"
      responses:
        "200":
          description: Comment resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: Invalid resolution_status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not REVIEW_OFFICER)
        "404":
          description: Comment or application not found

  /applications/{application_id}/review-decision/:
    post:
      tags: [Reviews]
      summary: Submit review decision
      description: APPROVED advances to AWAITING_SENIOR_APPROVAL. REJECTED requires ≥100 char notes + regulation citation, sets status to REJECTED.
      operationId: submitReviewDecision
      security:
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDecisionResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not REVIEW_OFFICER)
        "404":
          description: Application not found or not assigned to you

  /reviews/sla-status/:
    get:
      tags: [Reviews]
      summary: Get SLA status overview
      description: Returns SLA configurations and all active reviews with days elapsed/remaining and breach status.
      operationId: getSLAStatus
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SLA status overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLAStatusResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not SENIOR_OFFICER or ADMIN)

  # ============================================================
  #  PAYMENTS
  # ============================================================
  /payments/invoices/{invoice_id}/:
    get:
      tags: [Payments]
      summary: Get invoice detail
      description: Returns invoice details with fee breakdown and available payment methods.
      operationId: getInvoiceDetail
      security:
        - BearerAuth: []
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetailResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Invoice not found

  /payments/invoices/{invoice_id}/pay/:
    post:
      tags: [Payments]
      summary: Initiate payment
      description: |
        For TELEBIRR and CBEBIRR: simulates 3-second processing, auto-confirms, generates receipt PDF, emails receipt, transitions application to AWAITING_ASSIGNMENT.
        For BANK_TRANSFER: returns bank account details, sets status to AWAITING_MANUAL_CONFIRMATION.
      operationId: initiatePayment
      security:
        - BearerAuth: []
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoicePayRequest"
      responses:
        "200":
          description: Payment processed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/InvoicePayResponseDigital"
                  - $ref: "#/components/schemas/InvoicePayResponseBankTransfer"
        "400":
          description: Invalid method or payment already processed
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Invoice not found

  /payments/invoices/{invoice_id}/bank-receipt/:
    post:
      tags: [Payments]
      summary: Upload bank transfer receipt
      description: Uploads a bank transfer receipt photo for AWAITING_MANUAL_CONFIRMATION payments.
      operationId: uploadBankReceipt
      security:
        - BearerAuth: []
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [receipt]
              properties:
                receipt:
                  type: string
                  format: binary
      responses:
        "200":
          description: Receipt uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankReceiptUploadResponse"
        "400":
          description: Invalid status or file validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
        "404":
          description: Invoice not found

  /payments/invoices/{invoice_id}/confirm/:
    put:
      tags: [Payments]
      summary: Confirm bank transfer payment (Admin)
      description: Manually confirms a bank transfer payment, generates receipt, updates application status to AWAITING_ASSIGNMENT.
      operationId: confirmPayment
      security:
        - BearerAuth: []
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceConfirmResponse"
        "400":
          description: Cannot confirm in current status
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not ADMIN)
        "404":
          description: Invoice not found

  /payments/receipts/{receipt_id}/:
    get:
      tags: [Payments]
      summary: Download payment receipt PDF
      description: Returns the payment receipt PDF file.
      operationId: downloadReceipt
      security:
        - BearerAuth: []
      parameters:
        - name: receipt_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Receipt PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
        "404":
          description: Receipt not found

  /payments/:
    get:
      tags: [Payments]
      summary: List all payments (Admin)
      description: Returns paginated payment records with optional filters.
      operationId: listPayments
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status
        - name: method
          in: query
          schema:
            type: string
          description: Filter by payment method
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated payment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not ADMIN)

  /payments/expire/:
    post:
      tags: [Payments]
      summary: Expire overdue payments (Cron)
      description: Marks payments older than 7 days (PENDING or AWAITING_MANUAL_CONFIRMATION) as EXPIRED and sets application status to PAYMENT_EXPIRED.
      operationId: expireOverduePayments
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Expiry processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentExpiryResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not ADMIN)

