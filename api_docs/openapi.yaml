paths:
  # ============================================================
  #  AUTHENTICATION
  # ============================================================
  /auth/register/:
    post:
      tags: [Authentication]
      summary: Register a new applicant account
      description: Creates an applicant account. Activation is immediate.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login/:
    post:
      tags: [Authentication]
      summary: Login with email and password
      description: Returns JWT access token, refresh token, role, and user_id.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh/:
    post:
      tags: [Authentication]
      summary: Refresh JWT access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid or expired refresh token

  /auth/logout/:
    post:
      tags: [Authentication]
      summary: Logout and blacklist refresh token
      description: Invalidates the current refresh token by blacklisting it.
      operationId: logoutUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Logout successful
        "401":
          description: Unauthenticated

  /auth/forgot-password/:
    post:
      tags: [Authentication]
      summary: Request password reset link
      description: Sends a time-limited reset link (30 min) to the registered email.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset link sent (always returns 200, even if email not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"

  /auth/reset-password/:
    post:
      tags: [Authentication]
      summary: Reset password with token
      description: Validates the token from the reset link and updates the password.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
        "400":
          description: Invalid or expired token

  # ============================================================
  #  USERS
  # ============================================================
  /users/me/:
    get:
      tags: [Users]
      summary: Get current user profile
      operationId: getMyProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthenticated
    put:
      tags: [Users]
      summary: Update current user profile
      description: Updates profile fields. All fields are optional for partial update.
      operationId: updateMyProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated

  /users/me/documents/:
    get:
      tags: [Users]
      summary: List vault documents
      description: Returns all documents in the applicant's document vault with status.
      operationId: listVaultDocuments
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Vault document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocumentListResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)
    post:
      tags: [Users]
      summary: Upload vault document
      description: Uploads national ID, passport, or TIN certificate to the applicant's document vault. Validates file type (JPEG/PNG/PDF), size (<5MB), and non-blank.
      operationId: uploadVaultDocument
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, document_type]
              properties:
                file:
                  type: string
                  format: binary
                document_type:
                  type: string
                  enum: [NATIONAL_ID, TIN_CERTIFICATE]
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocumentUploadResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not APPLICANT)

  /users/:
    get:
      tags: [Users]
      summary: List all users (Admin)
      description: Returns paginated user list. Supports role and status filters.
      operationId: listUsers
      security:
        - BearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role (APPLICANT, REVIEW_OFFICER, etc.)
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (ACTIVE, INACTIVE)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    nullable: true
                  previous:
                    type: string
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUserDetailResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden (not ADMIN)
    post:
