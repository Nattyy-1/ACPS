  # ============================================================
  /approvals/queue/:
    get:
      tags: [Approvals]
      summary: Get approvals queue
      description: Returns applications in AWAITING_SENIOR_APPROVAL status with reviewer recommendation summary.
      operationId: getApprovalsQueue
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Approvals queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalsQueueItem"
        "401":
          description: Unauthenticated
        "403":
